<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>

    <!-- Background: dark purple radial -->
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1e0038"/>
      <stop offset="100%" stop-color="#0d0010"/>
    </radialGradient>

    <!-- Glow filters at three sizes -->
    <filter id="gXL" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="gLG" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="gMD" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>

    <!-- Subtle pixel-dot grid for retro texture -->
    <pattern id="dots" x="0" y="0" width="56" height="56" patternUnits="userSpaceOnUse">
      <circle cx="28" cy="28" r="1.2" fill="#ffffff" opacity="0.055"/>
    </pattern>

  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Pixel dot grid overlay -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#dots)"/>

  <!-- Soft ambient halo behind the heart -->
  <ellipse cx="512" cy="530" rx="310" ry="250" fill="#ff6eb4" opacity="0.07"/>

  <!--
    PIXEL HEART — 13 cols × 11 rows, pixel size = 56px
    Origin: ox=148, oy=204  →  centered at (512, 512)

    Grid layout:
      Row  0  (y=204): cols 2-4 · cols 8-10
      Row  1  (y=260): cols 1-5 · cols 7-11
      Rows 2-4(y=316…428): cols 0-12 (full)
      Row  5  (y=484): cols 1-11
      Row  6  (y=540): cols 2-10
      Row  7  (y=596): cols 3-9
      Row  8  (y=652): cols 4-8
      Row  9  (y=708): cols 5-7
      Row 10  (y=764): col  6
  -->

  <!-- === XL diffuse outer halo === -->
  <path filter="url(#gXL)" fill="#ff6eb4" opacity="0.28"
    d="M260,204h168v56h-168Z M596,204h168v56h-168Z
       M204,260h280v56h-280Z M540,260h280v56h-280Z
       M148,316h728v56h-728Z M148,372h728v56h-728Z M148,428h728v56h-728Z
       M204,484h616v56h-616Z
       M260,540h504v56h-504Z
       M316,596h392v56h-392Z
       M372,652h280v56h-280Z
       M428,708h168v56h-168Z
       M484,764h56v56h-56Z"/>

  <!-- === LG glow ring === -->
  <path filter="url(#gLG)" fill="#ff6eb4" opacity="0.50"
    d="M260,204h168v56h-168Z M596,204h168v56h-168Z
       M204,260h280v56h-280Z M540,260h280v56h-280Z
       M148,316h728v56h-728Z M148,372h728v56h-728Z M148,428h728v56h-728Z
       M204,484h616v56h-616Z
       M260,540h504v56h-504Z
       M316,596h392v56h-392Z
       M372,652h280v56h-280Z
       M428,708h168v56h-168Z
       M484,764h56v56h-56Z"/>

  <!-- === MD bloom (tight inner glow) === -->
  <path filter="url(#gMD)" fill="#ffaadd" opacity="0.72"
    d="M260,204h168v56h-168Z M596,204h168v56h-168Z
       M204,260h280v56h-280Z M540,260h280v56h-280Z
       M148,316h728v56h-728Z M148,372h728v56h-728Z M148,428h728v56h-728Z
       M204,484h616v56h-616Z
       M260,540h504v56h-504Z
       M316,596h392v56h-392Z
       M372,652h280v56h-280Z
       M428,708h168v56h-168Z
       M484,764h56v56h-56Z"/>

  <!-- === Crisp base pixel heart === -->
  <path fill="#ff6eb4"
    d="M260,204h168v56h-168Z M596,204h168v56h-168Z
       M204,260h280v56h-280Z M540,260h280v56h-280Z
       M148,316h728v56h-728Z M148,372h728v56h-728Z M148,428h728v56h-728Z
       M204,484h616v56h-616Z
       M260,540h504v56h-504Z
       M316,596h392v56h-392Z
       M372,652h280v56h-280Z
       M428,708h168v56h-168Z
       M484,764h56v56h-56Z"/>

  <!-- === Highlight: top-left pixels — lighter pink, classic pixel art shine === -->
  <path fill="#ffe4f0" opacity="0.65"
    d="M260,204h168v56h-168Z
       M204,260h112v56h-112Z
       M148,316h112v56h-112Z"/>

  <!-- === Shadow: bottom tip pixels — slightly deeper === -->
  <path fill="#cc3a78" opacity="0.40"
    d="M372,652h280v56h-280Z
       M428,708h168v56h-168Z
       M484,764h56v56h-56Z"/>

</svg>
